name: Build & Push Split Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Which image to build (audio, images, video, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - audio
          - images
          - video

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/peperay/yt-factory

jobs:
  # ── Detect which files changed ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      audio: ${{ steps.filter.outputs.audio }}
      images: ${{ steps.filter.outputs.images }}
      video: ${{ steps.filter.outputs.video }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            audio:
              - 'Dockerfile.audio'
              - 'handler_audio.py'
              - 'start_audio.sh'
              - 'r2_helper.py'
            images:
              - 'Dockerfile.images'
              - 'handler_images.py'
              - 'start_images.sh'
              - 'r2_helper.py'
            video:
              - 'Dockerfile.video.slim'
              - 'handler_video.py'
              - 'start_video.sh'
              - 'r2_helper.py'
              - 'download_r2_inputs.py'
            shared:
              - 'extra_model_paths.yaml'

  build-audio:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'audio') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.audio == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.audio
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-audio:latest
            ${{ env.IMAGE_PREFIX }}-audio:${{ github.sha }}
          cache-from: type=gha,scope=audio
          cache-to: type=gha,mode=max,scope=audio

  build-images:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'images') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.images == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.images
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-images:latest
            ${{ env.IMAGE_PREFIX }}-images:${{ github.sha }}
          cache-from: type=gha,scope=images
          cache-to: type=gha,mode=max,scope=images

  build-video:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'video') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.video == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push video slim image
        id: build-video
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.video.slim
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-video:latest
            ${{ env.IMAGE_PREFIX }}-video:${{ github.sha }}

      - name: Expose image tag for downstream jobs
        id: meta
        run: |
          echo "image_tag=${{ env.IMAGE_PREFIX }}-video:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  update-runpod-video:
    # Auto-updates the RunPod video template (id 5ejm0u3xrt) when build-video
    # succeeds. Uses GraphQL query+mutation preserving all template fields,
    # only changing imageName to the new SHA tag. Only touches the video
    # template — audio and images templates still point to base images and
    # are NOT updated here.
    needs: build-video
    if: needs.build-video.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Update RunPod video template imageName
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          TEMPLATE_ID: 5ejm0u3xrt
          NEW_IMAGE: ${{ needs.build-video.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "${RUNPOD_API_KEY:-}" ]; then
            echo "ERROR: RUNPOD_API_KEY secret is missing"
            exit 1
          fi

          echo "Fetching current video template (id=${TEMPLATE_ID})..."
          QUERY_BODY=$(jq -cn --arg id "$TEMPLATE_ID" '{
            query: "query Template($id: String!) { podTemplate(id: $id) { id name imageName containerDiskInGb volumeInGb volumeMountPath dockerArgs ports isServerless readme env { key value } } }",
            variables: { id: $id }
          }')

          RESPONSE=$(curl -sS -X POST "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$QUERY_BODY")

          echo "Query response:"
          echo "$RESPONSE" | jq '.data.podTemplate | {id, name, imageName, containerDiskInGb, volumeInGb, envCount: (.env | length)}'

          if ! echo "$RESPONSE" | jq -e '.data.podTemplate' > /dev/null; then
            echo "ERROR: Failed to fetch template. Full response:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Building mutation input with new imageName=${NEW_IMAGE}..."
          MUTATION_BODY=$(echo "$RESPONSE" | jq -c --arg new "$NEW_IMAGE" '
            .data.podTemplate as $t
            | {
                query: "mutation SaveTemplate($input: SaveTemplateInput!) { saveTemplate(input: $input) { id name imageName } }",
                variables: {
                  input: {
                    id: $t.id,
                    name: $t.name,
                    imageName: $new,
                    containerDiskInGb: $t.containerDiskInGb,
                    volumeInGb: $t.volumeInGb,
                    volumeMountPath: $t.volumeMountPath,
                    dockerArgs: $t.dockerArgs,
                    ports: $t.ports,
                    isServerless: $t.isServerless,
                    readme: $t.readme,
                    env: ($t.env | map({key, value}))
                  }
                }
              }
          ')

          MUTATION_RESPONSE=$(curl -sS -X POST "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$MUTATION_BODY")

          echo "Mutation response:"
          echo "$MUTATION_RESPONSE"

          if ! echo "$MUTATION_RESPONSE" | jq -e '.data.saveTemplate.id' > /dev/null; then
            echo "ERROR: saveTemplate mutation failed"
            exit 1
          fi

          UPDATED_IMAGE=$(echo "$MUTATION_RESPONSE" | jq -r '.data.saveTemplate.imageName')
          echo "=== RunPod video template updated successfully ==="
          echo "Template ID: ${TEMPLATE_ID}"
          echo "New imageName: ${UPDATED_IMAGE}"
