name: Build & Push Split Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Which image to build (audio, images, video, compose, infographics, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - audio
          - images
          - video
          - compose
          - infographics

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/peperay/yt-factory

jobs:
  # ── Detect which files changed ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      audio: ${{ steps.filter.outputs.audio }}
      images: ${{ steps.filter.outputs.images }}
      video: ${{ steps.filter.outputs.video }}
      compose: ${{ steps.filter.outputs.compose }}
      infographics: ${{ steps.filter.outputs.infographics }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            audio:
              - 'Dockerfile.audio'
              - 'handler_audio.py'
              - 'start_audio.sh'
              - 'r2_helper.py'
            images:
              - 'Dockerfile.images'
              - 'handler_images.py'
              - 'start_images.sh'
              - 'r2_helper.py'
            video:
              - 'Dockerfile.video.slim'
              - 'handler_video.py'
              - 'start_video.sh'
              - 'r2_helper.py'
              - 'download_r2_inputs.py'
              - 'assets/**'
            compose:
              - 'Dockerfile.compose'
              - 'handler_video.py'
              - 'r2_helper.py'
              - 'download_r2_inputs.py'
              - 'assets/**'
            infographics:
              - 'Dockerfile.infographics'
              - 'handler_infographics.py'
              - 'render.js'
              - 'r2_helper.py'
            shared:
              - 'extra_model_paths.yaml'

  build-audio:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'audio') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.audio == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.audio
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-audio:latest
            ${{ env.IMAGE_PREFIX }}-audio:${{ github.sha }}
          cache-from: type=gha,scope=audio
          cache-to: type=gha,mode=max,scope=audio

      - name: Expose image tag for downstream jobs
        id: meta
        run: |
          echo "image_tag=${{ env.IMAGE_PREFIX }}-audio:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-images:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'images') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.images == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      # Dockerfile.images is now a thin overlay on top of the -base orphan
      # (sha256:76bbb76b) which already has models baked in. Build takes
      # <2 min (just copies 3 handler files over pre-built 33GB base).
      # No free-disk-space needed — no model downloads, no torch reinstall.
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.images
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-images:latest
            ${{ env.IMAGE_PREFIX }}-images:${{ github.sha }}

      - name: Expose image tag for downstream jobs
        id: meta
        run: |
          echo "image_tag=${{ env.IMAGE_PREFIX }}-images:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-video:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'video') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.video == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push video slim image
        id: build-video
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.video.slim
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-video:latest
            ${{ env.IMAGE_PREFIX }}-video:${{ github.sha }}

      - name: Expose image tag for downstream jobs
        id: meta
        run: |
          echo "image_tag=${{ env.IMAGE_PREFIX }}-video:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  update-runpod-audio:
    # Auto-updates the RunPod audio template (id lnri07h5s2) when build-audio
    # succeeds. Uses RunPod REST API (PATCH /v1/templates/{id}) — atomic, only
    # touches imageName, no risk of wiping env vars (unlike the GraphQL
    # saveTemplate mutation which requires all fields).
    # Pins by full commit SHA (40 chars), never :latest — policy 2026-04-13.
    # Verifies image exists in GHCR before patching to fail fast on bad tags.
    needs: build-audio
    if: needs.build-audio.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify image exists in GHCR + PATCH RunPod audio template
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMPLATE_ID: lnri07h5s2
          NEW_IMAGE: ${{ needs.build-audio.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "${RUNPOD_API_KEY:-}" ]; then
            echo "ERROR: RUNPOD_API_KEY secret is missing"
            exit 1
          fi

          # Extract <repo>:<tag> from full image string (drop ghcr.io/ prefix)
          REPO_TAG="${NEW_IMAGE#ghcr.io/}"
          REPO="${REPO_TAG%:*}"
          TAG="${REPO_TAG##*:}"
          echo "Verifying ${REPO}:${TAG} exists in GHCR..."

          GHCR_TOKEN=$(curl -sS -u "x:${GHCR_PULL_TOKEN}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO}:pull" | jq -r '.token')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -I \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${REPO}/manifests/${TAG}")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Image ${NEW_IMAGE} not found in GHCR (HTTP ${HTTP_CODE})"
            exit 1
          fi
          echo "Image manifest found in GHCR"

          echo "PATCHing RunPod audio template (id=${TEMPLATE_ID})..."
          PATCH_BODY=$(jq -cn --arg img "$NEW_IMAGE" '{imageName: $img}')

          RESPONSE=$(curl -sS -X PATCH "https://rest.runpod.io/v1/templates/${TEMPLATE_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PATCH_BODY")

          UPDATED_IMAGE=$(echo "$RESPONSE" | jq -r '.imageName // empty')
          if [ "$UPDATED_IMAGE" != "$NEW_IMAGE" ]; then
            echo "ERROR: PATCH did not apply correctly"
            echo "Expected: ${NEW_IMAGE}"
            echo "Got     : ${UPDATED_IMAGE}"
            echo "Response: ${RESPONSE}" | jq -r 'del(.env)'
            exit 1
          fi

          echo "=== RunPod audio template updated successfully ==="
          echo "Template ID  : ${TEMPLATE_ID}"
          echo "New imageName: ${UPDATED_IMAGE}"

  update-runpod-images:
    # Auto-updates the RunPod images template (id 7y8167cpbf) when build-images
    # succeeds. Added 2026-04-19 after the monolithic migration cycle.
    # 2026-04-23: fixed downstream `outputs.image_tag` on build-images (the
    # previous version had NEW_IMAGE empty, PATCHing the template with a
    # broken ref). Also, the monolithic image now bakes models in (see
    # Dockerfile.images rewrite same date) so PATCHing to the monolithic
    # SHA is safe — was not before, when it pushed an image missing models.
    # Pins by full commit SHA (40 chars), never :latest.
    needs: build-images
    if: needs.build-images.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify image exists in GHCR + PATCH RunPod images template
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMPLATE_ID: 7y8167cpbf
          NEW_IMAGE: ${{ needs.build-images.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "${RUNPOD_API_KEY:-}" ]; then
            echo "ERROR: RUNPOD_API_KEY secret is missing"
            exit 1
          fi

          if [ -z "${NEW_IMAGE:-}" ]; then
            echo "ERROR: NEW_IMAGE is empty — build-images.outputs.image_tag not set"
            exit 1
          fi

          REPO_TAG="${NEW_IMAGE#ghcr.io/}"
          REPO="${REPO_TAG%:*}"
          TAG="${REPO_TAG##*:}"
          echo "Verifying ${REPO}:${TAG} exists in GHCR..."

          GHCR_TOKEN=$(curl -sS -u "x:${GHCR_PULL_TOKEN}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO}:pull" | jq -r '.token')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -I \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${REPO}/manifests/${TAG}")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Image ${NEW_IMAGE} not found in GHCR (HTTP ${HTTP_CODE})"
            exit 1
          fi
          echo "Image manifest found in GHCR"

          echo "PATCHing RunPod images template (id=${TEMPLATE_ID})..."
          PATCH_BODY=$(jq -cn --arg img "$NEW_IMAGE" '{imageName: $img}')

          RESPONSE=$(curl -sS -X PATCH "https://rest.runpod.io/v1/templates/${TEMPLATE_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PATCH_BODY")

          UPDATED_IMAGE=$(echo "$RESPONSE" | jq -r '.imageName // empty')
          if [ "$UPDATED_IMAGE" != "$NEW_IMAGE" ]; then
            echo "ERROR: PATCH did not apply correctly"
            echo "Expected: ${NEW_IMAGE}"
            echo "Got     : ${UPDATED_IMAGE}"
            echo "Response: ${RESPONSE}" | jq -r 'del(.env)'
            exit 1
          fi

          echo "=== RunPod images template updated successfully ==="
          echo "Template ID  : ${TEMPLATE_ID}"
          echo "New imageName: ${UPDATED_IMAGE}"

  update-runpod-video:
    # Auto-updates the RunPod video template (id 5ejm0u3xrt) when build-video
    # succeeds. Migrated from GraphQL saveTemplate to REST PATCH 2026-04-14
    # for consistency with update-runpod-audio. REST is atomic (only touches
    # imageName), simpler, and removes the landmine of GraphQL saveTemplate
    # requiring all fields (omitting env wipes variables).
    # Pins by full commit SHA (40 chars), never :latest.
    needs: build-video
    if: needs.build-video.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify image exists in GHCR + PATCH RunPod video template
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMPLATE_ID: 5ejm0u3xrt
          NEW_IMAGE: ${{ needs.build-video.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "${RUNPOD_API_KEY:-}" ]; then
            echo "ERROR: RUNPOD_API_KEY secret is missing"
            exit 1
          fi

          REPO_TAG="${NEW_IMAGE#ghcr.io/}"
          REPO="${REPO_TAG%:*}"
          TAG="${REPO_TAG##*:}"
          echo "Verifying ${REPO}:${TAG} exists in GHCR..."

          GHCR_TOKEN=$(curl -sS -u "x:${GHCR_PULL_TOKEN}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO}:pull" | jq -r '.token')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -I \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${REPO}/manifests/${TAG}")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Image ${NEW_IMAGE} not found in GHCR (HTTP ${HTTP_CODE})"
            exit 1
          fi
          echo "Image manifest found in GHCR"

          echo "PATCHing RunPod video template (id=${TEMPLATE_ID})..."
          PATCH_BODY=$(jq -cn --arg img "$NEW_IMAGE" '{imageName: $img}')

          RESPONSE=$(curl -sS -X PATCH "https://rest.runpod.io/v1/templates/${TEMPLATE_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PATCH_BODY")

          UPDATED_IMAGE=$(echo "$RESPONSE" | jq -r '.imageName // empty')
          if [ "$UPDATED_IMAGE" != "$NEW_IMAGE" ]; then
            echo "ERROR: PATCH did not apply correctly"
            echo "Expected: ${NEW_IMAGE}"
            echo "Got     : ${UPDATED_IMAGE}"
            echo "Response: ${RESPONSE}" | jq -r 'del(.env)'
            exit 1
          fi

          echo "=== RunPod video template updated successfully ==="
          echo "Template ID  : ${TEMPLATE_ID}"
          echo "New imageName: ${UPDATED_IMAGE}"

  build-compose:
    # Compose slim image — CPU-only (no ComfyUI, no models). Built in parallel
    # with build-video when handler_video.py changes, so the CPU endpoint stays
    # in sync with the GPU endpoint's handler code.
    #
    # Image: ghcr.io/peperay/yt-factory-compose:<sha>
    # Target: ~500-800 MB (vs ~30 GB for yt-factory-video).
    # Template NOT auto-PATCHed — manual validation + PATCH required on first
    # deploy (see Dockerfile.compose header). Once validated, add an
    # `update-runpod-compose` job analogous to update-runpod-{audio,video}.
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'compose') ||
      github.event_name == 'push' &&
      needs.changes.outputs.compose == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.compose
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-compose:latest
            ${{ env.IMAGE_PREFIX }}-compose:${{ github.sha }}
          cache-from: type=gha,scope=compose
          cache-to: type=gha,mode=max,scope=compose

      - name: Expose image tag for downstream jobs
        id: meta
        run: |
          echo "image_tag=${{ env.IMAGE_PREFIX }}-compose:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-infographics:
    # Puppeteer slim image — CPU-only (Chromium + Node + Python + ffmpeg).
    # Renders HTML infographics with CSS @keyframes animations to MP4.
    # Used by the CPU endpoint `yt-factory-infographics` (id pending until first
    # manual setup via RunPod UI — see Dockerfile.infographics header).
    #
    # Image: ghcr.io/peperay/yt-factory-infographics:<sha>
    # Target: ~600-800 MB. Cold start: ~30-45s first pull.
    # Template NOT auto-PATCHed — manual validation required on first deploy.
    # Once validated, add `update-runpod-infographics` job analogous to
    # `update-runpod-{audio,video}`.
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'infographics') ||
      github.event_name == 'push' &&
      needs.changes.outputs.infographics == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.infographics
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-infographics:latest
            ${{ env.IMAGE_PREFIX }}-infographics:${{ github.sha }}
          cache-from: type=gha,scope=infographics
          cache-to: type=gha,mode=max,scope=infographics

      - name: Expose image tag for downstream jobs
        id: meta
        run: |
          echo "image_tag=${{ env.IMAGE_PREFIX }}-infographics:${{ github.sha }}" >> "$GITHUB_OUTPUT"
