name: Build & Push Split Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Which image to build (audio, images, video, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - audio
          - images
          - video

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/peperay/yt-factory

jobs:
  # ── Detect which files changed ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      audio: ${{ steps.filter.outputs.audio }}
      images: ${{ steps.filter.outputs.images }}
      video: ${{ steps.filter.outputs.video }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            audio:
              - 'Dockerfile.audio'
              - 'handler_audio.py'
              - 'start_audio.sh'
              - 'r2_helper.py'
            images:
              - 'Dockerfile.images'
              - 'handler_images.py'
              - 'start_images.sh'
              - 'r2_helper.py'
            video:
              - 'Dockerfile.video.slim'
              - 'handler_video.py'
              - 'start_video.sh'
              - 'r2_helper.py'
              - 'download_r2_inputs.py'
            shared:
              - 'extra_model_paths.yaml'

  build-audio:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'audio') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.audio == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.audio
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-audio:latest
            ${{ env.IMAGE_PREFIX }}-audio:${{ github.sha }}
          cache-from: type=gha,scope=audio
          cache-to: type=gha,mode=max,scope=audio

  build-images:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'images') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.images == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.images
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-images:latest
            ${{ env.IMAGE_PREFIX }}-images:${{ github.sha }}
          cache-from: type=gha,scope=images
          cache-to: type=gha,mode=max,scope=images

  build-video:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'video') ||
      github.event_name == 'push' &&
      (needs.changes.outputs.video == 'true' || needs.changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.video.slim
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-video:latest
            ${{ env.IMAGE_PREFIX }}-video:${{ github.sha }}
          cache-from: type=gha,scope=video
          cache-to: type=gha,mode=max,scope=video

  update-runpod:
    # DISABLED: RunPod templates now point to base images (built via build-base.yml)
    # The CI/CD images here don't have models baked in. Don't overwrite the templates.
    needs: [build-audio, build-images, build-video]
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Update RunPod templates
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          SHA="${{ github.sha }}"
          PREFIX="ghcr.io/peperay/yt-factory"

          # R2 env vars — preserved across deploys via GitHub Secrets
          R2_ENV="{key: \\\"R2_ENDPOINT\\\", value: \\\"${R2_ENDPOINT}\\\"}, {key: \\\"R2_ACCESS_KEY_ID\\\", value: \\\"${R2_ACCESS_KEY_ID}\\\"}, {key: \\\"R2_SECRET_ACCESS_KEY\\\", value: \\\"${R2_SECRET_ACCESS_KEY}\\\"}, {key: \\\"R2_BUCKET\\\", value: \\\"${R2_BUCKET}\\\"}"

          update_template() {
            local id=$1 name=$2 image=$3
            echo "Updating $name → $image"
            curl -s -X POST https://api.runpod.io/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { saveTemplate(input: { id: \\\"$id\\\", name: \\\"$name\\\", imageName: \\\"$image\\\", containerDiskInGb: 20, volumeInGb: 0, dockerArgs: \\\"\\\", env: [$R2_ENV] }) { id name imageName } }\"}"
            echo ""
          }

          # Only update templates for endpoints that were rebuilt
          if [ "${{ needs.build-audio.result }}" == "success" ]; then
            update_template "lnri07h5s2" "yt-factory-audio" "${PREFIX}-audio:${SHA}"
          fi

          if [ "${{ needs.build-images.result }}" == "success" ]; then
            update_template "7y8167cpbf" "yt-factory-images" "${PREFIX}-images:${SHA}"
          fi

          if [ "${{ needs.build-video.result }}" == "success" ]; then
            update_template "VIDEO_TEMPLATE_ID" "yt-factory-video" "${PREFIX}-video:${SHA}"
          fi

          echo "=== RunPod templates updated (SHA: ${SHA}) ==="
